<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SleepSync — Sleep Tracker & Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0a12;
      --surface: #12121e;
      --surface2: #1a1a2e;
      --border: #ffffff12;
      --accent: #7c6aff;
      --accent2: #ff6a9b;
      --accent3: #6affd4;
      --text: #e8e8f0;
      --text-muted: #9090b0;
      --card-glow: 0 0 40px #7c6aff18;
      --radius: 20px;
    }
    [data-theme="light"] {
      --bg: #f0f0f8;
      --surface: #ffffff;
      --surface2: #e8e8f5;
      --border: #00000010;
      --text: #1a1a2e;
      --text-muted: #6060a0;
      --card-glow: 0 4px 30px #7c6aff15;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
  </style>
</head>
<body>
   <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="wrapper">
    <header>
      <div class="logo">
        <div class="logo-icon">🌙</div>
        <div>
          <div class="logo-text">SleepSync</div>
          <div class="logo-sub">Track · Reflect · Improve</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-icon" onclick="toggleTheme()">☀️</button>
        <button class="btn-icon" onclick="exportData()">📤</button>
      </div>
    </header>

    <div class="streak-badge">🔥 <span id="streakText">Start your streak tonight</span></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('dashboard', this)">📊 Dashboard</button>
      <button class="tab" onclick="switchTab('log', this)">➕ Log Sleep</button>
      <button class="tab" onclick="switchTab('history', this)">📅 History</button>
      <button class="tab" onclick="switchTab('tips', this)">💡 Insights</button>
    </div>

    <!-- DASHBOARD -->
    <div id="tab-dashboard" class="tab-panel active">
      <div class="card">
        <div class="score-section">
          <div class="score-ring-wrap">
            <svg viewBox="0 0 100 100" width="100" height="100">
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" style="stop-color:#7c6aff"/>
                  <stop offset="100%" style="stop-color:#ff6a9b"/>
                </linearGradient>
              </defs>
              <circle class="ring-bg" cx="50" cy="50" r="45"/>
              <circle class="ring-fill" id="scoreRing" cx="50" cy="50" r="45"/>
            </svg>
            <div class="score-num" id="scoreNum">—<small>score</small></div>
          </div>
          <div class="score-details">
            <h3 id="scoreLabel">No data yet</h3>
            <p id="scoreDesc">Log your first sleep to see your score.</p>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-card accent"><div class="stat-value" id="avgDuration">—</div><div class="stat-label">Avg Hours</div></div>
          <div class="stat-card accent2"><div class="stat-value" id="avgQuality">—</div><div class="stat-label">Avg Quality</div></div>
          <div class="stat-card accent3"><div class="stat-value" id="totalLogs">0</div><div class="stat-label">Entries</div></div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:4px;">
            <span>Weekly Sleep Debt</span><span id="debtLabel">—</span>
          </div>
          <div class="debt-bar-wrap"><div class="debt-bar" id="debtBar" style="width:0%"></div></div>
          <div style="font-size:11px;color:var(--text-muted);">Goal: 56 hrs/week (8 hrs/night)</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📈 Sleep Duration Chart</div>
        <div class="chart-wrap"><canvas id="sleepChart"></canvas></div>
      </div>
    </div>

  </div>
  <div class="toast" id="toast"></div>
</body>
</html>
