<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SleepSync — Sleep Tracker & Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0a12;
      --surface: #12121e;
      --surface2: #1a1a2e;
      --border: #ffffff12;
      --accent: #7c6aff;
      --accent2: #ff6a9b;
      --accent3: #6affd4;
      --text: #e8e8f0;
      --text-muted: #9090b0;
      --card-glow: 0 0 40px #7c6aff18;
      --radius: 20px;
    }
    [data-theme="light"] {
      --bg: #f0f0f8;
      --surface: #ffffff;
      --surface2: #e8e8f5;
      --border: #00000010;
      --text: #1a1a2e;
      --text-muted: #6060a0;
      --card-glow: 0 4px 30px #7c6aff15;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
  </style>
</head>
<body>
  <h1 style="color:white;padding:20px">SleepSync loading...</h1>
</body>
</html>
